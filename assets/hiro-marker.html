<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hiro AR Marker — Print or Display</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f5f5f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: Georgia, serif;
      padding: 20px;
    }
    h1 {
      font-size: 18px;
      color: #333;
      margin-bottom: 6px;
      text-align: center;
    }
    p {
      font-size: 13px;
      color: #666;
      margin-bottom: 24px;
      text-align: center;
      max-width: 440px;
      line-height: 1.6;
    }
    .marker-wrap {
      background: white;
      padding: 32px;
      border-radius: 8px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    }
    /* The Hiro marker is rendered as an SVG-based representation
       using the official AR.js Hiro marker pattern.
       For web display this img points to the AR.js hosted PNG. */
    img.hiro {
      display: block;
      width: min(280px, 80vw);
      height: min(280px, 80vw);
      image-rendering: pixelated;
    }
    .caption {
      margin-top: 16px;
      font-size: 12px;
      color: #999;
      text-align: center;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .tip {
      margin-top: 28px;
      background: #fffde7;
      border: 1px solid #ffe082;
      border-radius: 8px;
      padding: 14px 20px;
      font-size: 13px;
      color: #5d4037;
      max-width: 340px;
      line-height: 1.6;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>🦁 AR Hiro Marker</h1>
  <p>Display this page on a screen (or print it) and point your camera at the black square below to start the AR story.</p>

  <div class="marker-wrap">
    <!-- Official AR.js Hiro marker image hosted on GitHub -->
    <img
      class="hiro"
      src="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png"
      alt="Hiro AR marker"
      crossorigin="anonymous"
    >
    <div class="caption">Hiro Marker — AR.js Standard</div>
  </div>

  <div class="tip">
    💡 Keep this marker flat and well-lit.<br>
    Hold your phone <strong>20–50 cm</strong> away from the marker.<br>
    The AR scene will snap into place in seconds.
  </div>
</body>
</html>
